<div class="eval-scoring-bar mb-3" id="scoringBar"
     data-model="{{ model }}" data-qid="{{ question_id }}" data-batch="{{ batch }}">
  <div class="d-flex gap-3 align-items-start flex-wrap">
    <div class="d-flex align-items-center gap-2 flex-shrink-0">
      <label class="form-label mb-0 fw-bold small">Score</label>
      <select class="form-select form-select-sm" id="scoringScore" style="width:70px;">
        <option value="">—</option>
        {% for s in range(11) %}
        <option value="{{ s }}" {% if scoring.get('score') == s %}selected{% endif %}>{{ s }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="flex-grow-1" style="min-width:200px;max-width:500px;">
      <textarea class="form-control form-control-sm eval-resizable-textbox" id="scoringNote"
                rows="2" placeholder="Evaluation note (max 500 chars)…"
                maxlength="500">{{ scoring.get('note', '') }}</textarea>
    </div>
    <button class="btn btn-sm btn-outline-primary flex-shrink-0" id="saveScoring">
      <i class="bi bi-floppy"></i> Save
    </button>

    <div class="vr mx-1"></div>

    <div class="d-flex align-items-start gap-2 flex-shrink-0">
      <label class="form-label mb-0 fw-bold small">Markers</label>
      <textarea class="form-control form-control-sm eval-resizable-textbox eval-marker-textbox"
                id="markerText" rows="2" placeholder="Add marker…"
                maxlength="100"></textarea>
      <select class="form-select form-select-sm" id="markerColor" style="width:90px;">
        <option value="info">Info</option>
        <option value="success">Good</option>
        <option value="warning">Warn</option>
        <option value="danger">Bad</option>
        <option value="primary">Note</option>
      </select>
      <button class="btn btn-sm btn-outline-success" id="addMarker">
        <i class="bi bi-plus-lg"></i>
      </button>
    </div>
  </div>

  <div class="mt-2 d-flex flex-wrap gap-1" id="markersContainer">
    {% for m in markers %}
    <span class="badge bg-{{ m.color }} marker-badge" data-marker-id="{{ m.id }}" data-source="{{ m.source }}">
      {% if m.source == 'agent' %}<i class="bi bi-robot me-1"></i>{% endif %}
      {{ m.text }}
      {% if m.source == 'manual' %}
      <button type="button" class="btn-close btn-close-white ms-1 marker-delete" style="font-size:0.5em;" aria-label="Remove"></button>
      {% endif %}
    </span>
    {% endfor %}
  </div>
</div>
