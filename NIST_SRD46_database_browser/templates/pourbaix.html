{% extends "base.html" %}
{% block title %}Pourbaix Atlas — SRD-46{% endblock %}

{% block content %}
<h3 class="mb-3"><i class="bi bi-moisture"></i> Pourbaix Atlas</h3>
<p class="text-muted small">Electrochemical species data from the Pourbaix Atlas. Click an element to view its species.</p>

<div class="row g-2">
{% for el, cnt in elements.items() %}
  <div class="col-auto">
    <a href="{{ url_for('pourbaix.pourbaix_detail', element=el) }}"
       class="btn btn-sm btn-outline-primary">
      {{ el }} <span class="badge bg-secondary">{{ cnt }}</span>
    </a>
  </div>
{% endfor %}
</div>
{% endblock %}
